<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darshanam Booking - Gangamma Devi Temple</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #8b0000;
            color: white;
            padding: 15px;
            font-size: 24px;
        }
        .booking-form {
            background: white;
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background-color: #8b0000;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #a52a2a;
        }
        .home-btn {
            background-color: #555;
            margin-top: 20px;
        }
        .home-btn:hover {
            background-color: #777;
        }
        footer {
            margin-top: 20px;
            padding: 10px;
            background-color: #8b0000;
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <h1>Darshanam Booking - Gangamma Devi Temple</h1>
    </header>
    
    <section class="booking-form">
        <form action="submit_booking.php" method="post">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>
            
            <label for="date">Darshanam Date:</label>
            <input type="date" id="date" name="date" required>
            
            <label for="time">Preferred Timing:</label>
            <select id="time" name="time" required>
                <option value="morning">Morning (6 AM - 12 PM)</option>
                <option value="afternoon">Afternoon (12 PM - 4 PM)</option>
                <option value="evening">Evening (4 PM - 8 PM)</option>
            </select>
            
            <label for="tickets">Number of Tickets:</label>
            <input type="number" id="tickets" name="tickets" min="1" max="10" required>
            
            <label for="gender">Gender:</label>
            <select id="gender" name="gender" required>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
            
            <p><strong>Ticket Cost:</strong> ₹50 per person</p>
            
            <button type="submit">Book Now</button>
        </form>
        
        <!-- Back to Home Button -->
            <p><a href="file:///C:/Users/pc/OneDrive/Desktop/index.html.html"><button class="contact-btn">Back to Home</button></a></p>

    </section>
    
    <footer>
        <p>© 2025 Gangamma Devi Temple | Proddatur, Andhra Pradesh</p>
    </footer>
</body>
</html>
